<body>
    <div id="loading-screen" class="glass-loader">
        <div class="loader-line" id="loader-line"></div>
    </div>
    <div class="bg-lines"></div>
    <div id="mouse-glow"></div>

    <header class="glass-header">
        <div class="header-inner">
            <button id="menu-btn" class="menu-btn" aria-label="Menu">
                <span class="shape-square"></span>
                <span class="shape-cross"></span>
            </button>
            <nav id="global-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="research.html" class="nav-link active">Research</a>
                <a href="contact.html" class="nav-link">Contact</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="research-header glass-panel" style="margin-top: 4rem; padding: 2rem 3rem;">
            <h1 class="section-title">Research & Thoughts</h1>
            <p style="color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-top: 0.5rem;">
                Exploring the intersections of society, queer identities, and communities.
            </p>
            
            <div class="view-toggle">
                <button class="toggle-btn active" data-target="academic-view">Academic Output</button>
                <button class="toggle-btn" data-target="fieldnotes-view">Field Notes (Blog)</button>
            </div>
        </section>

        <div id="academic-view" class="view-section active">
            <div id="academic-content"></div>
        </div>

        <div id="fieldnotes-view" class="view-section">
            <div id="fieldnotes-list"></div>
            <div id="fieldnotes-single" style="display: none;">
                <button id="back-to-notes" class="toggle-btn" style="margin-bottom: 2rem;">← Back to Notes</button>
                <div id="markdown-content" class="markdown-body glass-panel" style="padding: 3rem;"></div>
            </div>
        </div>
