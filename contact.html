        <div class="loader-line" id="loader-line"></div>
    </div>
    <div class="bg-lines"></div>
    <div id="mouse-glow"></div>

    <header class="glass-header">
        <div class="header-inner">
            <button id="menu-btn" class="menu-btn" aria-label="Menu">
                <span class="shape-square"></span>
                <span class="shape-cross"></span>

                <a href="research.html" class="nav-link">Research</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </nav>

    <main class="container">
        <section class="contact-section glass-panel">
            <div class="contact-header">
                <h1 class="section-title">Get in Touch</h1>
                <p class="contact-desc">
                    I am always open to new conversations and connections. Please feel free to drop a message below.
                </p>

                <div class="social-links">
                    <a href="https://bsky.app/profile/ryuseiethanueno.bsky.social" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="Bluesky">
                        <svg viewBox="0 -1 16 16" width="22" height="22" fill="currentColor">
                            <path d="M3.468 1.948C5.303 3.325 7.276 6.118 8 7.616c.725-1.498 2.698-4.29 4.532-5.668C13.855.955 16 .186 16 2.632c0 .489-.28 4.105-.444 4.692-.572 2.04-2.653 2.561-4.504 2.246 3.236.551 4.06 2.375 2.281 4.2-3.376 3.464-4.852-.87-5.23-1.98-.07-.204-.103-.3-.103-.218 0-.081-.033.014-.102.218-.379 1.11-1.855 5.444-5.231 1.98-1.778-1.825-.955-3.65 2.28-4.2-1.85.315-3.932-.205-4.503-2.246C.28 6.737 0 3.12 0 2.632 0 .186 2.145.955 3.468 1.948"/>

                    </a>
                    <a href="https://x.com/ryuseiethanueno" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="X (Twitter)">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                        </svg>
                    </a>
                    <a href="https://www.tiktok.com/@ryuseiethanueno" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="TikTok">
                        <svg viewBox="0 0 448 512" width="20" height="20" fill="currentColor">
                            <path d="M448,209.91a210.06,210.06,0,0,1-122.77-39.25V349.38A162.55,162.55,0,1,1,185,188.31V278.2a74.62,74.62,0,1,0,52.23,71.18V0l88,0a121.18,121.18,0,0,0,1.86,22.17h0A122.18,122.18,0,0,0,381,102.39a121.43,121.43,0,0,0,67,20.14Z"/>
                        </svg>
                    </a>
                </div>

                <div class="external-profiles">
                    <a href="https://orcid.org/0009-0003-1010-660X" target="_blank" rel="noopener noreferrer" class="profile-badge">
                        <span class="badge-title">ORCID</span>
                        <span class="badge-subtitle">Global Academic Profile</span>
                    </a>
                    <a href="https://researchmap.jp/ryusei_ueno" target="_blank" rel="noopener noreferrer" class="profile-badge">
                        <span class="badge-title">Researchmap</span>
                        <span class="badge-subtitle">Japanese Database</span>
                    </a>
                </div>
            </div>

            <form action="https://formspree.io/f/xwvzgrdw" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required placeholder="Inquiry about...">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Your message here..."></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    <span class="btn-text">Send Message</span>
                    <span class="btn-line"></span>
                </button>
            </form>
        </section>
    </main>
